<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocChat — RAG Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">

    <!-- ── Sidebar ───────────────────────────────────── -->
    <aside class="sidebar">

      <div class="brand">
        <div class="brand-logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <span class="brand-name">DocChat</span>
      </div>

      <button class="btn-new-chat" id="newChatBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Chat
      </button>

      <!-- Documents -->
      <div class="sb-section">
        <div class="sb-label">Documents</div>

        <label class="upload-zone" for="fileInput" id="uploadZone">
          <input type="file" id="fileInput" accept=".pdf,.txt" hidden>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span>Upload PDF or TXT</span>
        </label>

        <div id="uploadFeedback" class="upload-feedback" hidden></div>
        <div id="docsList" class="docs-list"></div>
      </div>

      <!-- Conversations -->
      <div class="sb-section sb-section--grow">
        <div class="sb-label">Conversations</div>
        <div id="convsList" class="convs-list"></div>
      </div>

      <!-- Footer -->
      <div class="sb-footer">
        <button class="btn-clear" id="clearAllBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
          </svg>
          Clear all history
        </button>
      </div>
    </aside>

    <!-- ── Main ──────────────────────────────────────── -->
    <main class="main">
      <div class="messages-wrap" id="messagesWrap"></div>

      <div class="input-wrap">
        <div id="docsBar" class="docs-bar"></div>
        <div class="input-card">
          <textarea
            id="userInput"
            placeholder="Select a document from the sidebar to start…"
            rows="1"
            disabled
          ></textarea>
          <div class="input-row">
            <span class="input-hint">Enter to send · Shift+Enter for new line</span>
            <button id="sendBtn" disabled>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
        <p class="disclaimer">AI responses may be incorrect — always verify important information.</p>
      </div>
    </main>

  </div>
  <script src="/static/app.js"></script>
</body>
</html>
